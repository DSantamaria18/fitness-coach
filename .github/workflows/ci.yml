name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente Prisma
        run: npx prisma generate

      - name: Comprobar formato
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Valores ficticios: solo para que el build pueda arrancar (p.ej.
          # instanciar el cliente de Prisma), no son secretos reales ni se
          # usan para desplegar. Detecta roturas como páginas protegidas que
          # Next intenta prerenderizar en estático (ver DECISIONS.md).
          DATABASE_URL: "file:./ci-build.db"
          AUTH_SECRET: "ci-build-only-not-a-real-secret"
          ADMIN_USERNAME: "ci"
          ADMIN_PASSWORD_HASH: "$2b$10$ciciciciciciciciciciciOciciciciciciciciciciciciciciciO"
